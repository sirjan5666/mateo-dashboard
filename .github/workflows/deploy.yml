name: CI & Deploy

# Flow: open a PR → the build gate runs on it. Merge to main → gate re-runs to
# confirm main is green (but does NOT deploy). Go live only when YOU manually run
# this workflow ("Run workflow" button, or `gh workflow run "CI & Deploy"`), which
# re-verifies then deploys. Production only ever ships what's on GitHub `main`.

on:
  pull_request:
    branches: [main] # verify every PR
  push:
    branches: [main] # verify main after a merge (gate only — no deploy)
  workflow_dispatch: {} # manual deploy — this is the only thing that ships to prod

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  gate:
    name: Build gate (typecheck · lint · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Server — install · typecheck · lint · build
        working-directory: server
        run: |
          npm ci
          npm run typecheck
          npm run lint
          npm run build
      - name: Client — install · lint · build (build also runs tsc)
        working-directory: client
        run: |
          npm ci
          npm run lint
          npm run build

  deploy:
    name: Deploy to Lightsail
    needs: gate # only after the gate passes
    if: github.event_name == 'workflow_dispatch' # ⇐ ships ONLY on your manual trigger
    runs-on: ubuntu-latest
    steps:
      - name: SSH → pull + deploy on the box
        env:
          SSH_KEY: ${{ secrets.MATEO_SSH_KEY }}
          HOST: ${{ secrets.MATEO_HOST }}
          DEPLOY_USER: ${{ secrets.MATEO_USER }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new "$DEPLOY_USER@$HOST" \
            'set -e; sudo git -C /opt/mateo pull --ff-only && sudo bash /opt/mateo/deploy/deploy.sh'
